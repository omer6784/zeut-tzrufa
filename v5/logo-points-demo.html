<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Points Demo — זהות צרופה</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fffae6; color: #1c1c1c; height: 100%; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; gap: 12px; }
    h1 { font-size: 14px; letter-spacing: 0.05em; opacity: 0.6; }
    #stage { width: min(800px, 92vw); aspect-ratio: 1 / 1; background: #fffae6; border: 1px solid rgba(28,28,28,0.12); position: relative; }
    canvas { width: 100% !important; height: 100% !important; display: block; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; font-size: 13px; opacity: 0.7; }
    .controls label { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-inline-start: 4px; }
  </style>
</head>
<body>
  <h1>זהות צרופה — דוגמת חומריות נקודות (לא משולב בממשק)</h1>
  <div id="stage"><canvas id="cv"></canvas></div>
  <div class="controls">
    <label>רקע: <span class="swatch" style="background:#fffae6"></span> קרם</label>
    <label>נקודות חזית: <span class="swatch" style="background:#ff601a"></span> כתום</label>
    <label>נקודות צד: <span class="swatch" style="background:#976b43"></span> חום</label>
    <label>קצוות מתעמעמות אל הרקע</label>
  </div>
  <script type="module" src="./logo-points-demo.js"></script>
</body>
</html>
